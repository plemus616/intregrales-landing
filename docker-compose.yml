version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sir-frontend
    ports:
      - "4173:4173"
    restart: unless-stopped
    networks:
      - sir-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4173/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  sir-network:
    driver: bridge
